<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Strength Checker</title>
</head>
<body>
    <script>
        let password=prompt("enter password:");
        if(password.length<8)
    {
        document.write("password must be at least 8 character long.");
    }
    else if(!/[A-Z]/.test(password))
    {
        document.write("password must contain at least one uppercase letter");
    }
    else if(!/[0-9]/.test(password))
    {
        document.write("password must contain at least one number");
    }
    else{
        document.write("strong password");
    }
    </script>
</body>
</html>
